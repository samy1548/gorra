<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorras - Gorra Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="logo">🧢 Supremía</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="productos.html">Gorras</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </header>

  <section class="productos" style="margin: 0px;">
  <div class="card" data-modelo="gorra1">
    <img class="gorraImg" src="./imagen/10.jpeg" alt="Gorra Negra">
    <h3 class="gorraNombre">Gorra Negra</h3>
    <p>RD$590</p>

    <label>Color:</label>
    <select class="colorSelector">
      <option value="negra">Negra</option>
      <option value="GrisClaro">Gris Claro</option>
      <option value="Naranja">Naranja</option>
      <option value="Roja">Roja</option>
      <option value="Azul">Azul</option>
      <option value="Verde">Verde</option>
      <option value="Blanca">Blanca</option>
      <option value="AzulMarino">Azul Marino</option>
      <option value="Gris">Gris</option>
      <option value="Marron">Marron</option>
    </select>

    <button class="comprarBtn">💵 Comprar</button>
  </div>

  <div class="card" data-modelo="gorra2">
    <img class="gorraImg" src="./logo.jpeg" alt="Gorra Roja">
    <h3 class="gorraNombre">Gorra Roja</h3>
    <p>$18 USD</p>

    <label>Color:</label>
    <select class="colorSelector">
      <option value="roja">Roja</option>
      <option value="verde">Verde</option>
      <option value="azul">Azul</option>
    </select>

    <button class="comprarBtn">💵 Comprar</button>
  </div>

   <div class="card" data-modelo="gorra3">
    <img class="gorraImg" src="./logo.jpeg" alt="Gorra Roja">
    <h3 class="gorraNombre">Gorra Roja</h3>
    <p>$18 USD</p>

    <label>Color:</label>
    <select class="colorSelector">
      <option value="roja">Roja</option>
      <option value="verde">Verde</option>
      <option value="azul">Azul</option>
    </select>

    <button class="comprarBtn">💵 Comprar</button>
  </div>

</section>


    <footer id="contacto">
        <p>© 2025 Gorra Premium - Todos los derechos reservados</p>
    </footer>
<!-- Modal para imagen grande -->
<div id="modal" class="modal">
  <span class="cerrar">&times;</span>
  <img class="modal-contenido" id="imgGrande">
</div>

    <script src="script.js"></script>
</body>
</html>
